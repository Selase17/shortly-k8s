
# ── App Deployment ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shortly
  namespace: shortly
  labels:
    app: shortly
spec:
  replicas: 2                    # TWO copies — this is the shared-state proof.
                                 # Both read/write the same Redis, so a code
                                 # made by one replica is found by the other.
  selector:
    matchLabels:
      app: shortly
  template:
    metadata:
      labels:
        app: shortly             # pods labelled app=shortly (Service targets this)
    spec:
      containers:
        - name: shortly
          image: selase/shortly-app:latest   # YOUR published image from Week 1
          ports:
            - containerPort: 5000
          # Inject all keys from the ConfigMap as environment variables.
          # envFrom pulls every key/value, so the container sees
          # REDIS_HOST, REDIS_PORT, REDIS_DB automatically.
          envFrom:
            - configMapRef:
                name: shortly-config
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # ── Probes — your /healthz endpoint finally earns its keep ──
          # READINESS: is this pod ready to receive traffic? Until this
          # passes, the Service won't route requests to it. Because
          # /healthz pings Redis, a pod isn't "ready" until it can reach
          # Redis — so traffic only flows when the pod can actually work.
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          # LIVENESS: is this pod still alive? If this fails repeatedly,
          # Kubernetes restarts the container. Catches hung processes.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
---
# ── App Service ───────────────────────────────────────────────────────
# Routes traffic to the 2 shortly pods (load-balancing across them).
# NodePort makes it reachable from OUTSIDE the cluster (via minikube)
# so we can curl it. In a cloud cluster you'd use LoadBalancer or an
# Ingress instead; NodePort is the simplest way to reach it on Minikube.
apiVersion: v1
kind: Service
metadata:
  name: shortly
  namespace: shortly
spec:
  selector:
    app: shortly                 # route to pods labelled app=shortly
  ports:
    - port: 80                   # service port
      targetPort: 5000           # container port
  type: NodePort