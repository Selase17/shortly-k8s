
# A ConfigMap holds non-secret configuration as key-value pairs.
# We inject these into the app container as environment variables —
# the same REDIS_HOST/REDIS_PORT the app already reads (12-factor config).
# In docker-compose we set these in the compose file; in Kubernetes they
# live here. Same app image, different config source per environment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: shortly-config
  namespace: shortly
data:
  REDIS_HOST: "redis"        # the Redis Service name — k8s DNS resolves it
  REDIS_PORT: "6379"
  REDIS_DB: "0"