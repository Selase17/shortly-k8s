
# ── Redis Deployment ──────────────────────────────────────────────────
# A Deployment manages a set of identical pods. Here, one Redis pod.
# If the pod dies, the Deployment recreates it (self-healing).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: shortly
  labels:
    app: redis
spec:
  replicas: 1                    # one Redis instance (it's our shared state)
  selector:
    matchLabels:
      app: redis                 # this Deployment manages pods with label app=redis
  template:                      # the pod template — what each pod looks like
    metadata:
      labels:
        app: redis               # pods get this label (matches the selector above)
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
          # Resource requests/limits — tells the scheduler how much this
          # pod needs, and caps how much it can use. Good practice always.
          resources:
            requests:
              cpu: "50m"          # 0.05 of a CPU core
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # Liveness probe: is Redis alive? If this fails, restart the pod.
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ── Redis Service ─────────────────────────────────────────────────────
# A Service gives the Redis pod a STABLE name and IP. Pods come and go
# (new IP each time), but the Service name `redis` always resolves to
# whatever pod currently has label app=redis. This is how the app will
# reach Redis: hostname "redis" inside the cluster — exactly like the
# service name "redis" worked in docker-compose.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: shortly
spec:
  selector:
    app: redis                   # route traffic to pods with label app=redis
  ports:
    - port: 6379
      targetPort: 6379
  # ClusterIP (the default) = only reachable from inside the cluster.
  # Redis should NOT be exposed outside — internal-only is correct.
  type: ClusterIP