
# ── App Deployment ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  labels:
    app: {{ .Values.app.name }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}
    spec:
      containers:
        - name: {{ .Values.app.name }}
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.app.containerPort }}
          envFrom:
            - configMapRef:
                name: shortly-config
          resources:
            requests:
              cpu: {{ .Values.app.resources.requests.cpu | quote }}
              memory: {{ .Values.app.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.app.resources.limits.cpu | quote }}
              memory: {{ .Values.app.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.app.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.app.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 15
---
# ── App Service ───────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}
spec:
  selector:
    app: {{ .Values.app.name }}
  ports:
    - port: {{ .Values.app.service.port }}
      targetPort: {{ .Values.app.containerPort }}
  type: {{ .Values.app.service.type }}